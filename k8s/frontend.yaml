apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector: { matchLabels: { app: frontend } }
  template:
    metadata: { labels: { app: frontend } }
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: frontend
        image: 336129194698.dkr.ecr.ap-south-1.amazonaws.com/microshop/frontend:9fe35f9c5453efeee9b0e0fda09b0817df39ebb1
        ports: [{ containerPort: 8000 }]
        envFrom:
        - configMapRef: { name: microshop-config }   # CATALOG_URL + ORDER_URL
        readinessProbe:
          httpGet: { path: /health, port: 8000 }
          initialDelaySeconds: 5
        livenessProbe:
          httpGet: { path: /health, port: 8000 }
          initialDelaySeconds: 10
        resources:
          requests: { cpu: "50m", memory: "64Mi" }
          limits:   { cpu: "200m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  type: NodePort                       # bahar se accessible (user → frontend)
  selector: { app: frontend }
  ports: [{ port: 8000, targetPort: 8000, nodePort: 30080 }]
